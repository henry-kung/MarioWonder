<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mario Wonder — Wonder Seed Tracker</title>
  <style>
    :root {
      --bg: #0d0b1e;
      --card: #16143a;
      --card-hover: #1e1b4b;
      --gold: #ffd700;
      --gold-glow: rgba(255, 215, 0, 0.4);
      --text: #e8e4ff;
      --muted: #8884aa;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 0%, #1a1060 0%, transparent 60%),
        radial-gradient(circle at 20% 80%, #0a1540 0%, transparent 40%);
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      position: relative;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,215,0,0.06) 0%, transparent 100%);
      pointer-events: none;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.4rem;
    }

    .seed-icon-large {
      width: 40px; height: 40px;
      display: inline-block;
      background: radial-gradient(circle at 35% 35%, #fff7aa, #ffd700 50%, #ff9500);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 20px rgba(255,215,0,0.7), 0 0 40px rgba(255,215,0,0.3);
      flex-shrink: 0;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    /* ── Overall Progress ── */
    .overall-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-block {
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.2rem;
    }

    .overall-bar-wrap {
      width: min(500px, 90vw);
      margin: 0 auto;
    }

    .progress-bar-bg {
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      border-radius: 999px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(255,215,0,0.5);
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      padding: 0 1rem 2rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: rgba(255,215,0,0.12);
      border-color: rgba(255,215,0,0.4);
      color: var(--gold);
    }

    .btn.active {
      background: rgba(255,215,0,0.12);
      border-color: rgba(255,215,0,0.4);
      color: var(--gold);
    }

    .btn.danger:hover {
      background: rgba(255,80,80,0.12);
      border-color: rgba(255,80,80,0.4);
      color: #ff6060;
    }

    .mark-all-btn {
      padding: 0.18em 0.55em;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .mark-all-btn:hover {
      background: rgba(255,215,0,0.1);
      border-color: rgba(255,215,0,0.35);
      color: var(--gold);
    }
    .world-card.complete .mark-all-btn {
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── World Grid ── */
    .worlds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
      padding: 0 1.25rem 3rem;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ── World Card ── */
    .world-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .world-card:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .world-header {
      padding: 1rem 1.25rem 0.85rem;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: relative;
    }

    .world-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--world-color, #4CAF50);
      opacity: 0.07;
    }

    .world-emoji {
      font-size: 1.5rem;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .world-title-group {
      flex: 1;
      min-width: 0;
    }

    .world-number {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.7;
      color: var(--world-color, #4CAF50);
    }

    .world-name {
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .world-progress-text {
      font-size: 0.78rem;
      color: var(--muted);
      flex-shrink: 0;
      text-align: right;
    }

    .world-progress-text .frac {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }

    .world-progress-text .pct {
      font-size: 0.7rem;
      color: var(--world-color, #4CAF50);
    }

    .world-chevron {
      font-size: 0.7rem;
      color: var(--muted);
      transition: transform 0.25s;
      flex-shrink: 0;
      margin-left: 0.25rem;
    }

    .world-card.open .world-chevron {
      transform: rotate(180deg);
    }

    .world-bar-wrap {
      padding: 0 1.25rem 0.75rem;
      position: relative;
    }

    .world-bar-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--world-color, #4CAF50);
      opacity: 0.05;
    }

    .world-bar-bg {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .world-bar-fill {
      height: 100%;
      background: var(--world-color, #4CAF50);
      border-radius: 999px;
      transition: width 0.4s ease;
      box-shadow: 0 0 6px var(--world-color, #4CAF50);
    }

    /* ── Course List ── */
    .course-list {
      display: none;
      padding: 0 0 0.5rem;
    }

    .world-card.open .course-list {
      display: block;
    }

    .course-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }

    .course-row:hover {
      background: rgba(255,255,255,0.03);
    }

    .course-type-badge {
      font-size: 0.6rem;
      padding: 0.15em 0.5em;
      border-radius: 999px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
      min-width: 52px;
      width: fit-content;
      white-space: nowrap;
      text-align: center;
    }

    .type-course    { background: rgba(100,180,255,0.15); color: #64b4ff; }
    .type-boss      { background: rgba(255,100,100,0.15); color: #ff6464; }
    .type-challenge { background: rgba(180,100,255,0.15); color: #b464ff; }
    .type-trial     { background: rgba(100,255,180,0.15); color: #64ffb4; }
    .type-ko        { background: rgba(255,165,0,0.15);   color: #ffa500; }
    .type-special   { background: rgba(255,215,0,0.15);   color: #ffd700; }
    .type-search    { background: rgba(255,200,80,0.15);  color: #ffc850; }
    .type-palace    { background: rgba(255,215,0,0.18);   color: #ffe566; }
    .type-break     { background: rgba(100,255,220,0.15); color: #64ffd4; }
    .type-cabin     { background: rgba(180,140,100,0.2);  color: #c8a878; }
    .type-shop      { background: rgba(100,220,100,0.15); color: #64dc64; }
    .type-rescue    { background: rgba(255,140,0,0.18);   color: #ffaa40; }
    .type-observe   { background: rgba(80,180,255,0.15);  color: #50b4ff; }
    .type-castle    { background: rgba(100,50,180,0.2);   color: #a080e0; }

    .diff-stars {
      font-size: 0.6rem;
      color: rgba(255,215,0,0.55);
      flex-shrink: 0;
      letter-spacing: -0.5px;
      margin-left: 0.3rem;
    }

    .course-name {
      flex: 1;
      font-size: 0.82rem;
      line-height: 1.3;
      min-width: 0;
    }

    .course-row.all-collected .course-name {
      color: var(--muted);
    }

    .seeds-wrap {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    /* ── Seed Button ── */
    .seed-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(255,215,0,0.3);
      background: rgba(255,215,0,0.05);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0;
    }

    .seed-btn::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: rgba(255,215,0,0.2);
      transition: all 0.2s;
    }

    .seed-btn:hover {
      border-color: rgba(255,215,0,0.7);
      background: rgba(255,215,0,0.1);
      transform: scale(1.1);
    }

    .seed-btn:hover::after {
      background: rgba(255,215,0,0.5);
    }

    .seed-btn.collected {
      border-color: var(--gold);
      background: radial-gradient(circle at 40% 35%, #fff9c4, #ffd700 60%);
      box-shadow: 0 0 10px var(--gold-glow), 0 0 20px rgba(255,215,0,0.2);
    }

    .seed-btn.collected::after {
      background: rgba(120, 80, 0, 0.5);
    }

    .seed-btn:active {
      transform: scale(0.92);
    }

    /* Royal seed — red/crimson, from defeating a boss */
    .seed-btn.royal-seed {
      border-color: rgba(220,60,60,0.45);
      background: rgba(220,60,60,0.05);
    }
    .seed-btn.royal-seed::after {
      background: rgba(220,60,60,0.2);
    }
    .seed-btn.royal-seed:hover {
      border-color: rgba(220,60,60,0.85);
      background: rgba(220,60,60,0.12);
    }
    .seed-btn.royal-seed:hover::after {
      background: rgba(220,60,60,0.5);
    }
    .seed-btn.royal-seed.collected {
      border-color: #e04040;
      background: radial-gradient(circle at 40% 35%, #ffd4d4, #e04040 60%);
      box-shadow: 0 0 10px rgba(220,60,60,0.55), 0 0 20px rgba(220,60,60,0.2);
    }
    .seed-btn.royal-seed.collected::after {
      background: rgba(80,0,0,0.5);
    }

    /* Secret seed — purple instead of gold */
    .seed-btn.secret-seed {
      border-color: rgba(180,100,255,0.35);
      background: rgba(180,100,255,0.05);
    }
    .seed-btn.secret-seed::after {
      background: rgba(180,100,255,0.2);
    }
    .seed-btn.secret-seed:hover {
      border-color: rgba(180,100,255,0.8);
      background: rgba(180,100,255,0.12);
    }
    .seed-btn.secret-seed:hover::after {
      background: rgba(180,100,255,0.5);
    }
    .seed-btn.secret-seed.collected {
      border-color: #b464ff;
      background: radial-gradient(circle at 40% 35%, #f0d4ff, #b464ff 60%);
      box-shadow: 0 0 10px rgba(180,100,255,0.5), 0 0 20px rgba(180,100,255,0.2);
    }
    .seed-btn.secret-seed.collected::after {
      background: rgba(60,0,100,0.5);
    }

    /* Seed legend */
    .seed-legend {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      align-items: center;
      padding: 0 1rem 1.5rem;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .legend-seed {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid;
      display: inline-block;
    }
    .legend-seed.gold   { border-color: rgba(255,215,0,0.6);   background: rgba(255,215,0,0.1); }
    .legend-seed.purple { border-color: rgba(180,100,255,0.6); background: rgba(180,100,255,0.1); }
    .legend-seed.red    { border-color: rgba(220,60,60,0.6);   background: rgba(220,60,60,0.1); }

    /* Tooltip */
    .seed-btn[title]:hover::before {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a3e;
      color: var(--text);
      font-size: 0.7rem;
      padding: 0.3em 0.6em;
      border-radius: 6px;
      white-space: nowrap;
      max-width: 200px;
      white-space: normal;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.1);
      line-height: 1.3;
    }

    /* ── Complete checkmark ── */
    .world-complete-badge {
      display: none;
      font-size: 0.7rem;
      background: var(--world-color);
      color: #000;
      font-weight: 800;
      padding: 0.1em 0.5em;
      border-radius: 999px;
      margin-left: 0.4rem;
    }

    .world-card.complete .world-complete-badge {
      display: inline-block;
    }

    /* ── Completion celebration ── */
    @keyframes shimmer {
      0%, 100% { opacity: 0.06; }
      50% { opacity: 0.14; }
    }

    .world-card.complete .world-header::before {
      animation: shimmer 2s ease-in-out infinite;
    }

    /* ── Bellabel Park Section ── */
    .bellabel-section {
      max-width: 1300px;
      margin: 0 auto 3rem;
      padding: 0 1.25rem;
    }

    .bellabel-heading {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding: 1.25rem 1.5rem;
      background: linear-gradient(135deg, rgba(200,255,220,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(200,255,220,0.12);
      border-radius: var(--radius);
    }

    .bellabel-flower-icon {
      width: 44px; height: 44px;
      flex-shrink: 0;
      background: radial-gradient(circle at 40% 35%, #ffffff, #d0f0e0 50%, #a8dfc0);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 16px rgba(180,255,210,0.6), 0 0 32px rgba(180,255,210,0.2);
      animation: float 3s ease-in-out infinite;
    }

    .bellabel-heading h2 {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #d0fce8, #a8f0cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bellabel-heading p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .bellabel-progress-block {
      margin-left: auto;
      text-align: right;
      flex-shrink: 0;
    }

    .bellabel-progress-block .stat-number {
      color: #a8f0cc;
    }

    .bellabel-bar-wrap {
      padding: 0 1.5rem 0;
      margin-bottom: 1.5rem;
    }

    .bellabel-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }

    .bellabel-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #a8f0cc, #60d4a0);
      border-radius: 999px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(168,240,204,0.5);
    }

    .bellabel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    .koopaling-card {
      background: var(--card);
      border: 1px solid rgba(168,240,204,0.08);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .koopaling-card:hover {
      border-color: rgba(168,240,204,0.2);
      background: var(--card-hover);
    }

    .koopaling-card.collected {
      border-color: rgba(168,240,204,0.35);
    }

    .koopaling-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(168,240,204,0.08);
      border: 1px solid rgba(168,240,204,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .koopaling-info {
      flex: 1;
      min-width: 0;
    }

    .koopaling-name {
      font-size: 0.88rem;
      font-weight: 700;
    }

    .koopaling-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.1rem;
      line-height: 1.3;
    }

    /* Bellabel flower toggle button */
    .flower-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 2px solid rgba(168,240,204,0.35);
      background: rgba(168,240,204,0.05);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .flower-btn::after {
      content: '';
      width: 12px; height: 12px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: rgba(168,240,204,0.2);
      transition: all 0.2s;
    }

    .flower-btn:hover {
      border-color: rgba(168,240,204,0.8);
      background: rgba(168,240,204,0.1);
      transform: scale(1.1);
    }

    .flower-btn:hover::after {
      background: rgba(168,240,204,0.5);
    }

    .flower-btn.collected {
      border-color: #a8f0cc;
      background: radial-gradient(circle at 40% 35%, #ffffff, #a8f0cc 60%);
      box-shadow: 0 0 12px rgba(168,240,204,0.6), 0 0 24px rgba(168,240,204,0.2);
    }

    .flower-btn.collected::after {
      background: rgba(0,60,30,0.4);
    }

    .flower-btn:active { transform: scale(0.92); }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      padding-bottom: 2rem;
    }
  </style>
</head>
<body>

<header>
  <div class="title-wrap">
    <span class="seed-icon-large"></span>
    <h1>Wonder Seed Tracker</h1>
    <span class="seed-icon-large" style="animation-delay: -1.5s"></span>
  </div>
  <p class="subtitle">Super Mario Bros. Wonder</p>
  <div class="overall-stats">
    <div class="stat-block">
      <div class="stat-number" id="total-collected">0<span id="total-total" style="opacity:0.4;font-size:1.2rem"></span></div>
      <div class="stat-label">Seeds Found</div>
    </div>
    <div class="overall-bar-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="overall-bar" style="width:0%"></div>
      </div>
    </div>
    <div class="stat-block">
      <div class="stat-number" id="total-pct">0%</div>
      <div class="stat-label">Complete</div>
    </div>
    <div class="stat-block">
      <div class="stat-number" id="worlds-done">0<span id="worlds-total" style="opacity:0.4;font-size:1.2rem"></span></div>
      <div class="stat-label">Worlds Done</div>
    </div>
  </div>
</header>

<div class="seed-legend">
  <div class="legend-item"><span class="legend-seed gold"></span> Wonder Effect / Goal Pole</div>
  <div class="legend-item"><span class="legend-seed purple"></span> Secret / Hidden Wonder Flower</div>
  <div class="legend-item"><span class="legend-seed red"></span> Royal Seed (defeat boss)</div>
</div>
<div class="controls">
  <button class="btn" onclick="expandAll()">Expand All</button>

      { id:'sw_final', name:'The Final Test: Wonder Gauntlet', type:'special',
        seeds:[s('Activate the Wonder Effect'), s('Complete the Final Test')] },
      { id:'sw_ff', name:'The Final-Final Test', type:'special',
        seeds:[s('Complete the Final-Final Test')] },
    ]
  }
];

// ── State ──────────────────────────────────────
const STORAGE_KEY = 'mw_tracker_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState(); // { [courseId_seedIndex]: true }

function seedKey(courseId, seedIdx) {
  return `${courseId}_${seedIdx}`;
}

function isCollected(courseId, seedIdx) {
  return !!state[seedKey(courseId, seedIdx)];
}

function toggleSeed(courseId, seedIdx) {
  const k = seedKey(courseId, seedIdx);
  state[k] = !state[k];
  saveState(state);
  renderWorld(courseId.split('_')[0].replace(/\d/g, m => m));
  updateOverall();
}

// ── Render ─────────────────────────────────────
const typeLabel = {
  course: 'Course', boss: 'Boss', challenge: 'Badge',
  trial: 'Trial', ko: 'KO Arena', special: 'Special', search: 'Search',
  palace: 'Palace', break: 'Break!', cabin: 'Cabin', shop: 'Shop', rescue: 'Rescue', observe: 'Observe', castle: 'Castle'
};
const typeClass = {
  course: 'type-course', boss: 'type-boss', challenge: 'type-challenge',
  trial: 'type-trial', ko: 'type-ko', special: 'type-special', search: 'type-search',
  palace: 'type-palace', break: 'type-break', cabin: 'type-cabin', shop: 'type-shop',
  rescue: 'type-rescue', observe: 'type-observe', castle: 'type-castle'
};

function worldSeedCounts(world) {
  let total = 0, collected = 0;
  for (const c of world.courses) {
    for (let i = 0; i < c.seeds.length; i++) {
      if (c.seeds[i].royal) continue; // Royal Seeds tracked but not counted
      total++;
      if (isCollected(c.id, i)) collected++;
    }
  }
  return { total, collected };
}

function totalCounts() {
  let total = 0, collected = 0;
  for (const w of WORLDS) {
    const c = worldSeedCounts(w);
    total += c.total;
    collected += c.collected;
  }
  return { total, collected };
}

function buildWorldCard(world) {
  const card = document.createElement('div');
  card.className = 'world-card';
  card.id = 'card_' + world.id;
  card.style.setProperty('--world-color', world.color);

  const { total, collected } = worldSeedCounts(world);
  const pct = total > 0 ? Math.round((collected / total) * 100) : 0;
  if (collected === total) card.classList.add('complete');

  // Header
  card.innerHTML = `
    <div class="world-header" onclick="toggleCard('${world.id}')">
      <span class="world-emoji">${world.emoji}</span>
      <div class="world-title-group">
        <div class="world-number">${world.num}</div>
        <div class="world-name">${world.name}<span class="world-complete-badge">✓ Complete</span></div>
      </div>
      <div class="world-progress-text">
        <div class="frac">${collected}<span style="opacity:0.4">/${total}</span></div>
        <div class="pct">${pct}%</div>
      </div>
      <button class="mark-all-btn" onclick="event.stopPropagation(); markWorldDone('${world.id}')" title="Mark all as collected">✓ All</button>
      <span class="world-chevron">▼</span>
    </div>
    <div class="world-bar-wrap">
      <div class="world-bar-bg">
        <div class="world-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="course-list" id="courses_${world.id}">
      ${world.courses.map(c => buildCourseRow(c)).join('')}
    </div>
  `;

  return card;
}

function buildCourseRow(course) {
  const allCollected = course.seeds.every((_, i) => isCollected(course.id, i));
  const seedBtns = course.seeds.map((seed, i) => {
    const collected = isCollected(course.id, i) ? 'collected' : '';
    const secretCls = seed.royal ? 'royal-seed' : seed.secret ? 'secret-seed' : '';
    const label = course.seeds.length > 1 ? `Seed ${i+1}: ${seed.how}` : seed.how;
    return `<button class="seed-btn ${secretCls} ${collected}" title="${label}"
              onclick="toggleSeed('${course.id}', ${i})"
              aria-label="Seed ${i+1}: ${collected ? 'collected' : 'not collected'}"></button>`;
  }).join('');

  return `
    <div class="course-row ${allCollected ? 'all-collected' : ''}" id="row_${course.id}"${allCollected && hideCompleted ? ' style="display:none"' : ''}>
      <span class="course-type-badge ${typeClass[course.type]}">${typeLabel[course.type]}</span>
      <span class="course-name">${course.name}${course.diff ? `<span class="diff-stars">${course.diff}</span>` : ''}</span>
      <div class="seeds-wrap">${seedBtns}</div>
    </div>
  `;
}

function renderWorld(worldId) {
  // Re-render just the affected world card
  const world = WORLDS.find(w => w.id === worldId);
  if (!world) { renderAll(); return; }
  const existing = document.getElementById('card_' + worldId);
  if (!existing) return;
  const newCard = buildWorldCard(world);
  // Preserve open state
  if (existing.classList.contains('open')) newCard.classList.add('open');
  existing.replaceWith(newCard);
}

function renderAll() {
  const grid = document.getElementById('worlds-grid');
  grid.innerHTML = '';
  for (const world of WORLDS) {
    grid.appendChild(buildWorldCard(world));
  }
  updateOverall();
}

function updateOverall() {
  const { total, collected } = totalCounts();
  const pct = total > 0 ? Math.round((collected / total) * 100) : 0;
  const worldsDone = WORLDS.filter(w => {
    const c = worldSeedCounts(w);
    return c.total > 0 && c.collected === c.total;
  }).length;

  const collectedEl = document.getElementById('total-collected');
  // Replace only the text node (first child), leaving the span intact
  collectedEl.firstChild.textContent = collected;
  document.getElementById('total-total').textContent = '/' + total;
  document.getElementById('worlds-done').firstChild.textContent = worldsDone;
  document.getElementById('worlds-total').textContent = '/' + WORLDS.length;
  document.getElementById('total-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
}

// ── Interactions ───────────────────────────────
let hideCompleted = false;

function toggleCard(worldId) {
  const card = document.getElementById('card_' + worldId);
  card.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.world-card').forEach(c => c.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.world-card').forEach(c => c.classList.remove('open'));
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = {};
  saveState(state);
  renderAll();
}

function toggleHideCompleted() {
  hideCompleted = !hideCompleted;
  const btn = document.getElementById('hide-completed-btn');
  btn.classList.toggle('active', hideCompleted);
  btn.textContent = hideCompleted ? 'Show Completed' : 'Hide Completed';
  for (const world of WORLDS) renderWorld(world.id);
}

function markWorldDone(worldId) {
  const world = WORLDS.find(w => w.id === worldId);
  if (!world) return;
  for (const c of world.courses) {
    for (let i = 0; i < c.seeds.length; i++) {
      state[seedKey(c.id, i)] = true;
    }
  }
  saveState(state);
  renderWorld(worldId);
  updateOverall();
}

// ── Re-render a world after toggle ─────────────
// Override toggleSeed to use world id properly
window.toggleSeed = function(courseId, seedIdx) {
  const k = seedKey(courseId, seedIdx);
  state[k] = !state[k];
  saveState(state);

  // Find which world this course belongs to
  const world = WORLDS.find(w => w.courses.some(c => c.id === courseId));
  if (world) renderWorld(world.id);
  updateOverall();
};

// ── Bellabel Park ──────────────────────────────
const KOOPALINGS = [
  { id:'wendy',  name:'Wendy O. Koopa',   emoji:'🐟', hint:'#1 — Pipe-Rock Plateau · Wonder form: fish' },
  { id:'lemmy',  name:'Lemmy Koopa',      emoji:'🤡', hint:'#2 — Fluff-Puff Peaks · Wonder form: clown' },
  { id:'larry',  name:'Larry Koopa',      emoji:'💎', hint:'#3 — Shining Falls · Wonder form: crystal' },
  { id:'roy',    name:'Roy Koopa',        emoji:'👻', hint:'#4 — Sunbaked Desert · Wonder form: ghost' },
  { id:'iggy',   name:'Iggy Koopa',       emoji:'🌿', hint:'#5 — Fungi Mines · Wonder form: plant' },
  { id:'morton', name:'Morton Koopa Jr.', emoji:'🎭', hint:'#6 — Deep Magma Bog · Wonder form: marionette' },
  { id:'ludwig', name:'Ludwig von Koopa', emoji:'⛈️', hint:'#7 — Bellabel Park (Poplin scout notice appears in Bellabel Park) · Wonder form: storm' },
];

const BELLABEL_KEY = 'mw_bellabel_v1';

function loadBellabelState() {
  try { return JSON.parse(localStorage.getItem(BELLABEL_KEY)) || {}; }
  catch { return {}; }
}

function saveBellabelState(bs) {
  localStorage.setItem(BELLABEL_KEY, JSON.stringify(bs));
}

let bellabelState = loadBellabelState();

function toggleFlower(id) {
  bellabelState[id] = !bellabelState[id];
  saveBellabelState(bellabelState);
  renderBellabel();
}

function renderBellabel() {
  const section = document.getElementById('bellabel-section');
  const collected = KOOPALINGS.filter(k => bellabelState[k.id]).length;
  const total = KOOPALINGS.length;
  const pct = Math.round((collected / total) * 100);

  section.innerHTML = `
    <div class="bellabel-heading">
      <span class="bellabel-flower-icon"></span>
      <div>
        <h2>Bellabel Flowers</h2>
        <p>Meetup in Bellabel Park &mdash; NS2 Edition</p>
      </div>
      <div class="bellabel-progress-block">
        <div class="stat-number">${collected}<span style="opacity:0.4;font-size:1.2rem">/${total}</span></div>
        <div class="stat-label">${pct}% recovered</div>
      </div>
    </div>
    <div class="bellabel-bar-wrap">
      <div class="bellabel-bar-bg">
        <div class="bellabel-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="bellabel-grid">
      ${KOOPALINGS.map(k => {
        const done = bellabelState[k.id];
        return `
          <div class="koopaling-card ${done ? 'collected' : ''}">
            <div class="koopaling-avatar">${k.emoji}</div>
            <div class="koopaling-info">
              <div class="koopaling-name">${k.name}</div>
              <div class="koopaling-hint">${k.hint}</div>
            </div>
            <button class="flower-btn ${done ? 'collected' : ''}"
                    onclick="toggleFlower('${k.id}')"
                    title="${done ? 'Flower recovered' : 'Flower not yet recovered'}"></button>
          </div>`;
      }).join('')}
    </div>
  `;
}

// ── Init ───────────────────────────────────────
renderAll();
renderBellabel();
</script>
